<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="今日一句">
<meta name="theme-color" content="#1a1a2e">
<title>今日一句</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;900&family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --surface2: #16213e;
    --accent-pos: #f4a261;
    --accent-neg: #4cc9f0;
    --text: #e8e8f0;
    --text-dim: #888899;
    --border: rgba(255,255,255,0.08);
    --glow-pos: rgba(244,162,97,0.15);
    --glow-neg: rgba(76,201,240,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* Background mesh */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 10%, rgba(244,162,97,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 80% 80%, rgba(76,201,240,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    width: 100%;
    padding: 0 20px 40px;
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
  }

  /* Header */
  header {
    padding: 52px 0 24px;
    text-align: center;
  }

  .date-line {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  header h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 0.15em;
    color: var(--text);
  }

  /* Main card */
  .main-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 36px 28px 28px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
    transition: box-shadow 0.5s ease;
  }

  .main-card.pos-glow {
    box-shadow: 0 0 40px var(--glow-pos), 0 8px 32px rgba(0,0,0,0.4);
  }
  .main-card.neg-glow {
    box-shadow: 0 0 40px var(--glow-neg), 0 8px 32px rgba(0,0,0,0.4);
  }

  .card-label {
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-label .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .pos .dot { background: var(--accent-pos); box-shadow: 0 0 8px var(--accent-pos); }
  .neg .dot { background: var(--accent-neg); box-shadow: 0 0 8px var(--accent-neg); }
  .custom .dot { background: #a78bfa; box-shadow: 0 0 8px #a78bfa; }

  .pos { color: var(--accent-pos); }
  .neg { color: var(--accent-neg); }
  .custom-label { color: #a78bfa; }

  .quote-text {
    font-family: 'Noto Serif TC', serif;
    font-size: 22px;
    font-weight: 600;
    line-height: 1.8;
    color: var(--text);
    margin-bottom: 20px;
    min-height: 88px;
    transition: opacity 0.3s;
  }

  .quote-marks {
    font-size: 60px;
    line-height: 0.6;
    opacity: 0.08;
    font-family: Georgia, serif;
    position: absolute;
    top: 24px;
    right: 24px;
    color: var(--text);
  }

  .quote-author {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    min-height: 18px;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 20px 0;
  }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 10px;
  }

  .btn {
    flex: 1;
    padding: 13px 10px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.04);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    letter-spacing: 0.05em;
  }

  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: linear-gradient(135deg, rgba(244,162,97,0.2), rgba(244,162,97,0.1));
    border-color: rgba(244,162,97,0.3);
    color: var(--accent-pos);
  }
  .btn-primary:hover { background: linear-gradient(135deg, rgba(244,162,97,0.3), rgba(244,162,97,0.15)); }

  /* Section title */
  .section-title {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin: 28px 0 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  /* Add form */
  .add-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  textarea {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    color: var(--text);
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    line-height: 1.7;
    resize: none;
    width: 100%;
    min-height: 72px;
    outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: rgba(167,139,250,0.4); }
  textarea::placeholder { color: var(--text-dim); }

  .add-form-row {
    display: flex;
    gap: 8px;
  }

  .btn-add {
    flex: 1;
    padding: 11px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #a78bfa, #7c3aed);
    color: #fff;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    letter-spacing: 0.05em;
  }
  .btn-add:active { transform: scale(0.97); opacity: 0.9; }

  .btn-cancel {
    padding: 11px 16px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }

  /* User quotes list */
  .user-quotes {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .user-quote-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .user-quote-text {
    flex: 1;
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
  }

  .btn-delete {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 18px;
    padding: 0 2px;
    line-height: 1;
    flex-shrink: 0;
    margin-top: 1px;
    transition: color 0.2s;
  }
  .btn-delete:hover { color: #f87171; }

  .btn-add-toggle {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 11px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.2s;
    font-family: 'Noto Sans TC', sans-serif;
  }
  .btn-add-toggle:hover { border-color: #a78bfa; color: #a78bfa; }

  .empty-msg {
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
    padding: 16px;
    letter-spacing: 0.05em;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(30,30,50,0.95);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--text);
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s;
    z-index: 100;
    white-space: nowrap;
    backdrop-filter: blur(10px);
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Fade anim for quote swap */
  @keyframes quoteFade {
    0%   { opacity: 0; transform: translateY(6px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  .quote-anim { animation: quoteFade 0.4s ease both; }

  footer {
    margin-top: auto;
    padding-top: 32px;
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="date-line" id="date-line"></div>
    <h1>今日一句</h1>
  </header>

  <!-- Main quote card -->
  <div class="main-card" id="main-card">
    <div class="quote-marks">"</div>
    <div class="card-label" id="card-label">
      <span class="dot"></span>
      <span id="label-text">正能量</span>
    </div>
    <div class="quote-text" id="quote-text">載入中...</div>
    <div class="quote-author" id="quote-author"></div>
    <div class="divider"></div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="drawRandom()">🎲 再抽一句</button>
      <button class="btn" onclick="showDailyQuote()">📅 今日語錄</button>
    </div>
  </div>

  <!-- User quotes section -->
  <div class="section-title">
    <span>我的語錄庫</span>
    <button class="btn-add-toggle" id="toggle-btn" onclick="toggleAddForm()">＋ 新增</button>
  </div>

  <div class="add-form" id="add-form" style="display:none">
    <textarea id="new-quote-input" placeholder="輸入你想記住的句子…" rows="3"></textarea>
    <div class="add-form-row">
      <button class="btn-add" onclick="addUserQuote()">儲存</button>
      <button class="btn-cancel" onclick="toggleAddForm()">取消</button>
    </div>
  </div>

  <div class="user-quotes" id="user-quotes"></div>

  <footer>長按主畫面可加入桌面 · 每日自動更新</footer>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Built-in quotes ──────────────────────────────────────────────
const builtinQuotes = [
  // 正能量 8句
  { text: "你所經歷的每一個困難，都是為了讓你遇見更強大的自己。", type: "pos", author: "— 正能量" },
  { text: "別害怕緩慢前進，只害怕原地不動。", type: "pos", author: "— 中國諺語" },
  { text: "今天的你，比昨天的你更好一點，就已經足夠了。", type: "pos", author: "— 正能量" },
  { text: "勇氣不是沒有恐懼，而是決定比恐懼更重要的事。", type: "pos", author: "— 安布羅絲·雷德蒙" },
  { text: "種一棵樹最好的時機是十年前，其次是現在。", type: "pos", author: "— 中國諺語" },
  { text: "你不需要看到整段樓梯，只要踏出第一步就好。", type: "pos", author: "— 馬丁·路德·金" },
  { text: "每一個你不喜歡的今天，都是你努力的動力。", type: "pos", author: "— 正能量" },
  { text: "生命中最難熬的關卡，往往是你距離轉機最近的時刻。", type: "pos", author: "— 正能量" },
  // 負能量/現實 7句
  { text: "有些人走著走著就散了，這不是誰的錯，只是路不同了。", type: "neg", author: "— 人生哲思" },
  { text: "你的善良，要有鋒芒，否則只是軟弱。", type: "neg", author: "— 人生哲思" },
  { text: "努力不一定成功，但不努力一定很舒適。", type: "neg", author: "— 反向思考" },
  { text: "大多數的夢想，死在「明天再開始」這句話裡。", type: "neg", author: "— 現實語錄" },
  { text: "你以為的放棄，在別人眼裡叫做認清現實。", type: "neg", author: "— 現實語錄" },
  { text: "熱情是很好的燃料，但它燒完之後，靠的是習慣。", type: "neg", author: "— 人生哲思" },
  { text: "你不能讓所有人都滿意，因為那不是你存在的目的。", type: "neg", author: "— 人生哲思" },
];

// ── Helpers ──────────────────────────────────────────────────────
function getTodayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

function getUserQuotes() {
  try { return JSON.parse(localStorage.getItem('userQuotes') || '[]'); }
  catch { return []; }
}

function saveUserQuotes(arr) {
  localStorage.setItem('userQuotes', JSON.stringify(arr));
}

function allQuotes() {
  return [
    ...builtinQuotes,
    ...getUserQuotes().map(q => ({ text: q.text, type: 'custom', author: '— 我的語錄' }))
  ];
}

function getDailyIndex() {
  const key = getTodayKey();
  const stored = localStorage.getItem('dailyKey');
  if (stored === key) {
    return parseInt(localStorage.getItem('dailyIndex') || '0');
  }
  const idx = Math.floor(Math.random() * allQuotes().length);
  localStorage.setItem('dailyKey', key);
  localStorage.setItem('dailyIndex', idx);
  return idx;
}

// ── Display ──────────────────────────────────────────────────────
function renderQuote(q) {
  const card = document.getElementById('main-card');
  const label = document.getElementById('card-label');
  const labelText = document.getElementById('label-text');
  const quoteEl = document.getElementById('quote-text');
  const authorEl = document.getElementById('quote-author');

  // Remove old classes
  card.classList.remove('pos-glow','neg-glow');
  label.classList.remove('pos','neg','custom');

  quoteEl.classList.remove('quote-anim');
  void quoteEl.offsetWidth; // reflow
  quoteEl.classList.add('quote-anim');

  quoteEl.textContent = q.text;
  authorEl.textContent = q.author || '';

  if (q.type === 'pos') {
    card.classList.add('pos-glow');
    label.classList.add('pos');
    labelText.textContent = '正能量';
  } else if (q.type === 'neg') {
    card.classList.add('neg-glow');
    label.classList.add('neg');
    labelText.textContent = '現實語錄';
  } else {
    label.classList.add('custom');
    labelText.textContent = '我的語錄';
  }
}

function showDailyQuote() {
  const quotes = allQuotes();
  const idx = getDailyIndex() % quotes.length;
  renderQuote(quotes[idx]);
  showToast('📅 今日語錄');
}

let lastRandom = -1;
function drawRandom() {
  const quotes = allQuotes();
  let idx;
  do { idx = Math.floor(Math.random() * quotes.length); }
  while (quotes.length > 1 && idx === lastRandom);
  lastRandom = idx;
  renderQuote(quotes[idx]);
  showToast('🎲 已為你抽取一句');
}

// ── User quotes UI ───────────────────────────────────────────────
function renderUserQuotes() {
  const container = document.getElementById('user-quotes');
  const arr = getUserQuotes();
  if (arr.length === 0) {
    container.innerHTML = '<div class="empty-msg">尚無自訂語錄<br>點擊「＋ 新增」加入你的句子</div>';
    return;
  }
  container.innerHTML = arr.map((q, i) => `
    <div class="user-quote-item">
      <div class="user-quote-text">${escHtml(q.text)}</div>
      <button class="btn-delete" onclick="deleteUserQuote(${i})" title="刪除">×</button>
    </div>
  `).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggleAddForm() {
  const form = document.getElementById('add-form');
  const btn  = document.getElementById('toggle-btn');
  const showing = form.style.display !== 'none';
  form.style.display = showing ? 'none' : 'flex';
  btn.textContent = showing ? '＋ 新增' : '✕ 關閉';
  if (!showing) document.getElementById('new-quote-input').focus();
}

function addUserQuote() {
  const input = document.getElementById('new-quote-input');
  const text  = input.value.trim();
  if (!text) { showToast('請輸入句子內容'); return; }
  const arr = getUserQuotes();
  arr.push({ text });
  saveUserQuotes(arr);
  input.value = '';
  renderUserQuotes();
  toggleAddForm();
  showToast('✓ 已新增至語錄庫');
}

function deleteUserQuote(idx) {
  const arr = getUserQuotes();
  arr.splice(idx, 1);
  saveUserQuotes(arr);
  renderUserQuotes();
  showToast('已刪除');
}

// ── Toast ────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
}

// ── Date ─────────────────────────────────────────────────────────
function renderDate() {
  const d = new Date();
  const weekdays = ['日','一','二','三','四','五','六'];
  const m = d.getMonth()+1, day = d.getDate(), w = weekdays[d.getDay()];
  document.getElementById('date-line').textContent =
    `${d.getFullYear()} 年 ${m} 月 ${day} 日　星期${w}`;
}

// ── Keyboard ─────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'Enter') drawRandom();
});

// ── Init ─────────────────────────────────────────────────────────
renderDate();
showDailyQuote();
renderUserQuotes();
</script>
</body>
</html>
